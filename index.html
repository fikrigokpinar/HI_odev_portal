<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Hesaplamalı İstatistik — Ödev Portalı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .logo { font-size: 4rem; margin-bottom: 1rem; }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #fff;
        }

        .subtitle {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .status-online {
            background: rgba(40, 167, 69, 0.2);
            color: #51cf66;
            border: 1px solid rgba(40, 167, 69, 0.4);
        }

        .status-offline {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.4);
        }

        .status-checking {
            background: rgba(255, 193, 7, 0.2);
            color: #ffd43b;
            border: 1px solid rgba(255, 193, 7, 0.4);
        }

        .portal-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .portal-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .portal-link.disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .portal-link.disabled:hover {
            transform: none;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 0.9rem;
        }

        .info-row:last-child { border-bottom: none; }
        .info-label { color: #999; }
        .info-value { color: #ddd; font-weight: 500; }

        .refresh-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .refresh-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid #ffd43b;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .pulse {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .pulse-green {
            background: #51cf66;
            box-shadow: 0 0 0 0 rgba(81, 207, 102, 0.7);
            animation: pulse-anim 2s infinite;
        }

        .pulse-red { background: #ff6b6b; }

        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(81, 207, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(81, 207, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(81, 207, 102, 0); }
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #666;
        }

        .url-display {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #667eea;
            word-break: break-all;
            margin: 0.5rem 0;
        }

        .copy-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            color: #667eea;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 8px;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: rgba(102, 126, 234, 0.4);
        }

        /* ── Ödev Kartları ── */
        .odevler-section { margin-bottom: 1.5rem; }
        .odevler-section h2 {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 1rem;
        }

        .odev-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
            text-align: left;
            transition: all 0.3s;
        }
        .odev-card:hover {
            border-color: rgba(102, 126, 234, 0.4);
            background: rgba(255,255,255,0.08);
        }

        .odev-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .odev-baslik {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }
        .odev-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-aktif {
            background: rgba(40, 167, 69, 0.2);
            color: #51cf66;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }
        .badge-bitti {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .odev-aciklama {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.6rem;
            line-height: 1.4;
        }

        .odev-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.8rem;
        }

        .odev-indir-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #20bf6b, #0fb9b1);
            color: #fff;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .odev-indir-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(32, 191, 107, 0.4);
        }

        .odev-dosyalar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .no-odev {
            color: #666;
            font-size: 0.9rem;
            font-style: italic;
        }

        /* ── Countdown Timer ── */
        .countdown-timer {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin: 8px 0;
        }
        .countdown-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 6px 10px;
            min-width: 52px;
            text-align: center;
        }
        .countdown-box .cd-val {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1;
        }
        .countdown-box .cd-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }
        .countdown-sep {
            font-size: 1.2rem;
            font-weight: 700;
            opacity: 0.4;
        }

        /* Renk durumları */
        .cd-green .cd-val { color: #51cf66; }
        .cd-green { border: 1px solid rgba(81,207,102,0.3); }
        .cd-orange .cd-val { color: #ffa94d; }
        .cd-orange { border: 1px solid rgba(255,169,77,0.3); }
        .cd-red .cd-val { color: #ff6b6b; }
        .cd-red { border: 1px solid rgba(255,107,107,0.3); }

        .deadline-text {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }
        .deadline-text strong {
            color: #ccc;
        }

        .bitti-banner {
            background: rgba(220,53,69,0.1);
            border: 1px solid rgba(220,53,69,0.3);
            border-radius: 8px;
            padding: 8px 14px;
            color: #ff6b6b;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📚</div>
        <h1>Hesaplamalı İstatistik</h1>
        <p class="subtitle">Ödev Yükleme Portalı</p>

        <!-- Ödevler Bölümü -->
        <div id="odevlerSection" class="odevler-section" style="display:none;">
            <div class="card">
                <h2>📝 Aktif Ödevler</h2>
                <div id="odevlerList"></div>
            </div>
        </div>

        <!-- Ana Durum Kartı -->
        <div class="card">
            <div id="statusBadge" class="status-badge status-checking">
                <span class="spinner"></span> Kontrol ediliyor...
            </div>

            <div id="portalInfo" style="display:none;">
                <p style="margin-bottom: 0.5rem; color: #ccc;">Güncel portal adresi:</p>
                <div class="url-display" id="urlDisplay">—</div>
                <button class="copy-btn" onclick="copyURL()">📋 Kopyala</button>
            </div>

            <div id="portalButton" style="margin-top: 1.5rem;">
                <a id="goBtn" href="#" class="portal-link disabled" target="_blank">
                    ⏳ Yükleniyor...
                </a>
            </div>

            <div style="margin-top: 1rem;">
                <button class="refresh-btn" onclick="checkStatus()">🔄 Yenile</button>
            </div>
        </div>

        <!-- Bilgi Kartı -->
        <div class="card">
            <div class="info-row">
                <span class="info-label">📅 Son güncelleme</span>
                <span class="info-value" id="lastUpdate">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">🕐 Kontrol zamanı</span>
                <span class="info-value" id="checkTime">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">🔄 Otomatik yenileme</span>
                <span class="info-value">Her 30 saniye</span>
            </div>
        </div>

        <footer>
            Hesaplamalı İstatistik Dersi — 2025-2026 Bahar<br>
            Portal kapalıysa lütfen hocayı bilgilendirin.
        </footer>
    </div>

    <script>
        // ── url.json + odevler.json GitHub Pages'ın aynı dizininde ──
        const URL_JSON = './url.json';
        const ODEVLER_JSON = './odevler.json';
        let currentURL = null;
        let countdownIntervals = [];  // Canlı geri sayım timer'ları

        // ── Deadline parse — hem "DD/MM/YYYY HH:mm" hem ISO hem "YYYY-MM-DD HH:mm" destekler ──
        function parseDeadline(str) {
            if (!str) return null;
            // ISO format (2026-04-21T23:59:00)
            if (str.includes('T')) return new Date(str);
            // DD/MM/YYYY HH:mm
            const m1 = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})$/);
            if (m1) return new Date(+m1[3], +m1[2]-1, +m1[1], +m1[4], +m1[5]);
            // YYYY-MM-DD HH:mm
            const m2 = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})\s+(\d{1,2}):(\d{2})$/);
            if (m2) return new Date(+m2[1], +m2[2]-1, +m2[3], +m2[4], +m2[5]);
            // Fallback
            const d = new Date(str);
            return isNaN(d.getTime()) ? null : d;
        }

        // ── Countdown renk sınıfı ──
        function countdownColor(ms) {
            if (ms <= 0) return 'cd-red';
            if (ms < 1000 * 60 * 60 * 6) return 'cd-red';       // < 6 saat
            if (ms < 1000 * 60 * 60 * 24) return 'cd-orange';    // < 1 gün
            return 'cd-green';
        }

        // ── Countdown HTML üret ──
        function buildCountdownHTML(kalanMs, color) {
            if (kalanMs <= 0) {
                return `<div class="bitti-banner">⏰ Teslim Süresi Doldu!</div>`;
            }
            const gun  = Math.floor(kalanMs / (1000*60*60*24));
            const saat = Math.floor((kalanMs % (1000*60*60*24)) / (1000*60*60));
            const dk   = Math.floor((kalanMs % (1000*60*60)) / (1000*60));
            const sn   = Math.floor((kalanMs % (1000*60)) / 1000);

            return `<div class="countdown-timer">
                <div class="countdown-box ${color}"><div class="cd-val">${String(gun).padStart(2,'0')}</div><div class="cd-label">Gün</div></div>
                <span class="countdown-sep">:</span>
                <div class="countdown-box ${color}"><div class="cd-val">${String(saat).padStart(2,'0')}</div><div class="cd-label">Saat</div></div>
                <span class="countdown-sep">:</span>
                <div class="countdown-box ${color}"><div class="cd-val">${String(dk).padStart(2,'0')}</div><div class="cd-label">Dakika</div></div>
                <span class="countdown-sep">:</span>
                <div class="countdown-box ${color}"><div class="cd-val">${String(sn).padStart(2,'0')}</div><div class="cd-label">Saniye</div></div>
            </div>`;
        }

        // ── Ödevleri yükle ──
        async function loadOdevler() {
            const section = document.getElementById('odevlerSection');
            const list = document.getElementById('odevlerList');

            // Önceki interval'leri temizle
            countdownIntervals.forEach(id => clearInterval(id));
            countdownIntervals = [];

            try {
                const resp = await fetch(ODEVLER_JSON + '?t=' + Date.now());
                if (!resp.ok) throw new Error('odevler.json bulunamadı');

                const data = await resp.json();
                const odevler = data.odevler || [];

                if (odevler.length === 0) {
                    section.style.display = 'none';
                    return;
                }

                section.style.display = 'block';
                list.innerHTML = '';

                // Deadline'a göre sırala (aktifler önce)
                const now = new Date();
                odevler.sort((a, b) => {
                    const dA = parseDeadline(a.deadline);
                    const dB = parseDeadline(b.deadline);
                    const aAktif = dA && dA > now;
                    const bAktif = dB && dB > now;
                    if (aAktif !== bAktif) return bAktif - aAktif;
                    return (dB||0) - (dA||0);
                });

                odevler.forEach((odev, idx) => {
                    const deadline = parseDeadline(odev.deadline);
                    const aktif = deadline && deadline > now;
                    const kalanMs = deadline ? deadline - now : 0;

                    const card = document.createElement('div');
                    card.className = 'odev-card';

                    // Dosya indirme butonları
                    let dosyaHTML = '';
                    if (odev.dosyalar && odev.dosyalar.length > 0) {
                        dosyaHTML = '<div class="odev-dosyalar">';
                        odev.dosyalar.forEach(d => {
                            const icon = d.ad.endsWith('.pdf') ? '📄' :
                                         d.ad.endsWith('.m') ? '📐' :
                                         d.ad.endsWith('.zip') ? '📦' : '📎';
                            dosyaHTML += `<a href="./dosyalar/${d.ad}" download class="odev-indir-btn">${icon} ${d.ad}</a>`;
                        });
                        dosyaHTML += '</div>';
                    }

                    // Deadline string
                    const deadlineStr = deadline
                        ? deadline.toLocaleDateString('tr-TR', {day:'2-digit', month:'long', year:'numeric'}) +
                          ' ' + deadline.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})
                        : 'Belirtilmemiş';

                    // Countdown container id
                    const cdId = `countdown-${idx}`;
                    const color = countdownColor(kalanMs);

                    card.innerHTML = `
                        <div class="odev-header">
                            <span class="odev-baslik">${odev.id} — ${odev.baslik}</span>
                            <span class="odev-badge ${aktif ? 'badge-aktif' : 'badge-bitti'}">
                                ${aktif ? '🟢 Aktif' : '🔴 Bitti'}
                            </span>
                        </div>
                        <div class="odev-aciklama">${odev.aciklama || ''}</div>
                        <div class="deadline-text">📅 Son Teslim: <strong>${deadlineStr}</strong></div>
                        <div id="${cdId}">${buildCountdownHTML(kalanMs, color)}</div>
                        ${dosyaHTML}
                    `;
                    list.appendChild(card);

                    // Canlı geri sayım — her saniye güncelle
                    if (deadline) {
                        const intId = setInterval(() => {
                            const ms = deadline - new Date();
                            const el = document.getElementById(cdId);
                            if (!el) { clearInterval(intId); return; }
                            const c = countdownColor(ms);
                            el.innerHTML = buildCountdownHTML(ms, c);
                            if (ms <= 0) clearInterval(intId);
                        }, 1000);
                        countdownIntervals.push(intId);
                    }
                });
            } catch (err) {
                // odevler.json yok veya hata — bölümü gizle
                section.style.display = 'none';
            }
        }

        async function checkStatus() {
            const badge = document.getElementById('statusBadge');
            const urlDisplay = document.getElementById('urlDisplay');
            const portalInfo = document.getElementById('portalInfo');
            const goBtn = document.getElementById('goBtn');
            const lastUpdate = document.getElementById('lastUpdate');
            const checkTime = document.getElementById('checkTime');

            // Kontrol ediliyor...
            badge.className = 'status-badge status-checking';
            badge.innerHTML = '<span class="spinner"></span> Kontrol ediliyor...';

            checkTime.textContent = new Date().toLocaleString('tr-TR');

            try {
                // Cache'i bypass etmek için timestamp ekle
                const resp = await fetch(URL_JSON + '?t=' + Date.now());
                if (!resp.ok) throw new Error('url.json bulunamadı');

                const data = await resp.json();
                currentURL = data.url;
                const updatedAt = data.updated_at || '—';

                if (!currentURL || currentURL === '') {
                    throw new Error('URL boş');
                }

                // Aktif URL var — portal erişilebilir mi kontrol et
                portalInfo.style.display = 'block';
                urlDisplay.textContent = currentURL;
                lastUpdate.textContent = updatedAt;

                // Portal'a ping at (basit fetch)
                try {
                    // CORS nedeniyle hata alınabilir, o durumda da "muhtemelen açık" deriz
                    const ping = await fetch(currentURL, {
                        mode: 'no-cors',
                        cache: 'no-cache',
                        signal: AbortSignal.timeout(8000)
                    });

                    // no-cors modda response.ok her zaman false ama status 0 olur
                    badge.className = 'status-badge status-online';
                    badge.innerHTML = '<span class="pulse pulse-green"></span> Portal Açık';
                    goBtn.href = currentURL;
                    goBtn.className = 'portal-link';
                    goBtn.innerHTML = '🚀 Portala Git';
                    goBtn.style.pointerEvents = 'auto';
                } catch (pingErr) {
                    // Timeout veya ağ hatası — portal kapalı olabilir
                    badge.className = 'status-badge status-offline';
                    badge.innerHTML = '<span class="pulse pulse-red"></span> Portal Şu An Kapalı';
                    goBtn.href = currentURL;
                    goBtn.className = 'portal-link';
                    goBtn.innerHTML = '🔗 Yine de Dene';
                    goBtn.style.pointerEvents = 'auto';
                }

            } catch (err) {
                // url.json yok veya boş
                portalInfo.style.display = 'none';
                badge.className = 'status-badge status-offline';
                badge.innerHTML = '<span class="pulse pulse-red"></span> Portal Kapalı';
                goBtn.href = '#';
                goBtn.className = 'portal-link disabled';
                goBtn.innerHTML = '🔒 Portal Şu An Kapalı';
                goBtn.style.pointerEvents = 'none';
                lastUpdate.textContent = '—';
            }
        }

        function copyURL() {
            if (currentURL) {
                navigator.clipboard.writeText(currentURL).then(() => {
                    const btn = document.querySelector('.copy-btn');
                    btn.textContent = '✅ Kopyalandı!';
                    setTimeout(() => { btn.textContent = '📋 Kopyala'; }, 2000);
                });
            }
        }

        // Sayfa açılınca kontrol et
        loadOdevler();
        checkStatus();

        // Her 30 saniyede bir otomatik kontrol
        setInterval(checkStatus, 30000);
        // Ödevleri 2 dakikada bir güncelle (countdown zaten her saniye canlı)
        setInterval(loadOdevler, 120000);
    </script>
</body>
</html>
